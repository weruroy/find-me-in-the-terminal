# ════════════════════════════════════════════════════════════════════
#  Find me in the terminal — Docker Compose
#  Services: app (FastAPI) + nginx (reverse proxy)
#  Database: Neon PostgreSQL (external — no local DB container needed)
# ════════════════════════════════════════════════════════════════════

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fmitt_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
