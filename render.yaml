# ════════════════════════════════════════════════════════════════════
#  Render Deployment Config — Find me in the terminal
#  Docs: https://render.com/docs/blueprint-spec
# ════════════════════════════════════════════════════════════════════

services:
  - type: web
    name: find-me-in-the-terminal
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Render sets PORT automatically
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    # Free tier — upgrade to starter for always-on
    plan: free

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: APP_URL
        sync: false          # set manually in Render dashboard
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_NAME
        value: "Find me in the terminal"
      - key: FROM_EMAIL
        sync: false
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure value
      - key: UNSUBSCRIBE_SALT
        generateValue: true
